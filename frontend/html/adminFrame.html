<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Portal | Администратор</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header__inner container">
            <h2 class="header__logo">Company Portal</h2>
            <nav class="header__menu">
                <ul class="header__menu-list">
                    <li class="header__menu-item">
                        <span id="adminName" class="header__user"></span>
                    </li>
                    <li class="header__menu-item">
                        <button onclick="logout()" class="btn header__btn-login">Выйти</button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>


    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token || user.role !== 'admin') {
                alert('Доступ запрещен! Требуются права администратора.');
                window.location.href = '/';
                return;
            }
            
            document.getElementById('adminName').textContent = user.name + ' (Админ)';
            loadStats();
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }
    </script>
</body>
</html>
